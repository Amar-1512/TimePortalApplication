spring.application.name=timeentrysystem
server.port=${PORT:8080}

# MySQL connection (Railway provides these in Variables)
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/timeentrysystem?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA & Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
