spring.application.name=timeentrysystem
server.port=${PORT:8080}

# Railway will provide DATABASE_URL, or use local MySQL as fallback
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/timeportal}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:12345}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true


